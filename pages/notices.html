<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notices - Society Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body data-auth-required="true">
    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <h3>SMS Dashboard</h3>
        </div>
        <ul class="sidebar-nav">
            <li><a href="../index.html" class="nav-link">
                <i class="fas fa-home nav-icon"></i>
                <span class="nav-text">Home</span>
            </a></li>
            <li><a href="admin-dashboard.html" class="nav-link">
                <i class="fas fa-tachometer-alt nav-icon"></i>
                <span class="nav-text">Admin Dashboard</span>
            </a></li>
            <li><a href="resident-dashboard.html" class="nav-link">
                <i class="fas fa-user nav-icon"></i>
                <span class="nav-text">Resident Dashboard</span>
            </a></li>
            <li><a href="parking.html" class="nav-link">
                <i class="fas fa-car nav-icon"></i>
                <span class="nav-text">Parking</span>
            </a></li>
            <li><a href="payments.html" class="nav-link">
                <i class="fas fa-credit-card nav-icon"></i>
                <span class="nav-text">Payments</span>
            </a></li>
            <li><a href="complaints.html" class="nav-link">
                <i class="fas fa-exclamation-triangle nav-icon"></i>
                <span class="nav-text">Complaints</span>
            </a></li>
            <li><a href="notices.html" class="nav-link active">
                <i class="fas fa-bullhorn nav-icon"></i>
                <span class="nav-text">Notices</span>
            </a></li>
            <li><a href="#" onclick="logout()" class="nav-link logout-link">
                <i class="fas fa-sign-out-alt nav-icon"></i>
                <span class="nav-text">Logout</span>
            </a></li>
        </ul>
    </nav>

    <!-- Top Navbar -->
    <nav class="top-navbar">
        <div class="d-flex align-items-center h-100">
            <button id="sidebar-toggle" class="btn btn-link text-dark">
                <i class="fas fa-bars fs-4"></i>
            </button>
            <div class="ms-auto">
                <span class="me-3">Notice Board</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container-fluid">
            <div class="row mb-4">
                <div class="col">
                    <h1 class="h3 mb-0"><i class="fas fa-bullhorn me-2 text-primary"></i>Society Notices</h1>
                    <p class="text-muted">Important announcements and updates for residents.</p>
                </div>
            </div>

            <div class="row g-4">
                <!-- Create Notice Form -->
                <div class="col-lg-4">
                    <div class="card">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0"><i class="fas fa-plus me-2"></i>Create New Notice</h5>
                        </div>
                        <div class="card-body">
                            <form id="notice-form">
                                <div class="mb-3">
                                    <label class="form-label">Title</label>
                                    <input type="text" name="title" class="form-control" placeholder="Notice title">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Content</label>
                                    <textarea name="content" class="form-control" rows="4" placeholder="Write your notice..."></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Target</label>
                                    <select name="target" class="form-select">
                                        <option>All Residents</option>
                                        <option>Specific Building</option>
                                        <option>Committee Members</option>
                                    </select>
                                </div>
                                <button type="submit" class="btn btn-success w-100">Publish Notice</button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Notices List -->
                <div class="col-lg-8">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between">
                            <h5 class="mb-0">Published Notices</h5>
                            <span class="badge bg-primary fs-6" data-notice-count>12 Active</span>
                        </div>
                        <div class="card-body p-0">
                            <div id="notices-container">
                                <!-- Notices populated by JS -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
